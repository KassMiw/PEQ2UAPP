<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PEQ2UAPP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; }
  button { padding: 10px 15px; margin-top: 10px; }
  #progressBar {
    width: 100%;
    background: #eee;
    margin-top: 15px;
  }
  #progress {
    width: 0%;
    height: 20px;
    background: #4caf50;
  }
</style>
</head>
<body>
<h1>PEQ2UAPP</h1>
<h2>📊 ParametricEQ → ToneBoosters</h2>

<input type="file" id="fileInput" multiple accept=".txt">
<br>
<button onclick="processFiles()">Convert & Download ZIP</button>

<div id="progressBar">
  <div id="progress"></div>
</div>

<p id="status"></p>

<script>
function trimFloat(n) {
  return parseFloat(parseFloat(n).toFixed(6)).toString();
}

function updateProgress(percent) {
  document.getElementById("progress").style.width = percent + "%";
}

async function processFiles() {
  const files = document.getElementById("fileInput").files;

  if (!files.length) {
    alert("Pilih file dulu!");
    return;
  }

  const zip = new JSZip();
  let processed = 0;

  document.getElementById("status").innerText = "Processing...";

  for (let file of files) {
    const text = await file.text();
    const lines = text.split(/\r?\n/);

    if (!lines[0].startsWith("Preamp")) {
      alert(file.name + " bukan ParametricEQ!");
      continue;
    }

    const preset = file.name.replace(".txt", "");

    let preamp_raw = parseFloat(lines[0].split(" ")[1]);
    let preamp = trimFloat((preamp_raw + 20) / 40);

    let FREQ = Array(10).fill("0.9282573");
    let GAIN = Array(10).fill("0.5");
    let Q = Array(10).fill("0.39434525");
    let ON = Array(10).fill(0);

    let idx = 0;

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i];

      if (!line.includes("ON")) {
        idx++;
        continue;
      }

      let f = parseFloat((line.match(/Fc (\d+) Hz/) || [])[1]);
      let g = parseFloat((line.match(/Gain ([\-\d.]+) dB/) || [])[1]);
      let q = parseFloat((line.match(/Q ([\d.]+)/) || [])[1]);

      if (isNaN(f) || isNaN(g) || isNaN(q)) continue;

      let f_norm = Math.pow((f - 16) / (20000 - 16), 1/3).toFixed(8);
      let g_norm = trimFloat((g + 20) / 40);
      let q_norm = Math.pow((q - 0.1) / (10 - 0.1), 1/3).toFixed(8);

      FREQ[idx] = f_norm;
      GAIN[idx] = g_norm;
      Q[idx] = q_norm;
      ON[idx] = 1;

      idx++;
    }

    let xml = `<?xml version="1.0" encoding="ISO-8859-1"?>
<Preset>
<PresetInfo Name="${preset}" TenBand="1">
`;

    for (let i = 0; i < 10; i++) {
      xml += `
<Value>${FREQ[i]}</Value>
<Value>${GAIN[i]}</Value>
<Value>${ON[i]}</Value>
<Value>${Q[i]}</Value>
<Value>0.21428572</Value>
<Value>0</Value>
`;
    }

    xml += `
<Value>0</Value>
<Value>${preamp}</Value>
<Value>1</Value>
<Value>0.33333334</Value>
<Value>0.05</Value>
<Value>0</Value>
</PresetInfo>
</Preset>
`;

    zip.file(preset + ".xml", xml);

    processed++;
    updateProgress(Math.round((processed / files.length) * 100));
  }

  const blob = await zip.generateAsync({ type: "blob" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "TBEQPresets.zip";
  a.click();

  document.getElementById("status").innerText = "✅";
}
</script>

</body>
</html>
